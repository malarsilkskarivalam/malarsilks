services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: malar_user
      POSTGRES_PASSWORD: malar_password
      POSTGRES_DB: malar_silks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
